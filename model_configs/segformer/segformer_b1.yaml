# -----------------------------------
# Notes
# -----------------------------------
# This config assumes:
#   - RGB input images (`in_channels = 3`)
#   - binary segmentation (`num_classes = 2`)
# If training on a dataset with a different structure, change these arguments accordingly.
#
# Sequence-valued arguments are per encoder stage (4 stages in total).
#
# The SegFormer paper does not specify: 
#   - Decoder activation
#   - Dropout probabilities
#   - Maximum stochastic depth probability
# The values in this config are based on my own experiments.
#
# For in-depth parameter descriptions, see `src.models.segformer.SegFormerDefault`


# -----------------------------------
# Arguments
# -----------------------------------
# MiT-B1 Encoder
in_channels: 3                            # Number of input channels
feature_dims: [64, 128, 320, 512]         # Number of output features 
patch_sizes: [7, 3, 3, 3]                 # Patch sizes for patch embedding
strides: [4, 2, 2, 2]                     # Strides for patch embedding
num_blks: [2, 2, 2, 2]                    # Number of encoder blocks
num_heads: [1, 2, 5, 8]                   # Number of attention heads for efficient self-attention
reduce_ratios: [8, 4, 2, 1]               # Reduction ratio for efficient self-attention
hid_dims: [512, 1024, 1280, 2048]         # Hidden dimensions for Mix-FFNs (feature_dims * expansion_ratio)
enc_activations: 'gelu'                   # Activations for Mix-FFNs (can be a sequence)
ffn_dropout_probs: 0.05                   # Dropout probability for Mix-FFNs (can be a sequence)
attn_dropout_probs: 0.05                  # Dropout probability for attention weights (can be a sequence)
max_sdepth_prob: 0.1                      # Maximum stochastic depth probability

# MLP Decoder
fused_channels: 256                       # Number of channels when unifying encoder feature maps
num_classes: 2                            # Number of output classes
dec_activation: 'relu'                    # Activation applied before last MLP layer
channel_dropout_prob: 0.1                 # Channel-wise dropout probability applied after activation